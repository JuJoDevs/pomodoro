name: Firebase App Distribution

on:
  workflow_dispatch:
    inputs:
      build_variant:
        description: "APK variant to distribute"
        required: true
        type: choice
        default: debug
        options:
          - debug
          - release
      release_notes:
        description: "Release notes for Firebase App Distribution"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  distribute:
    name: Build and distribute APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Install Firebase CLI
        run: |
          curl -sL https://firebase.tools | bash
          firebase --version

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE_64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE_64 }}
        run: |
          printf "%s" "${GOOGLE_SERVICES_JSON_BASE_64}" | base64 --decode > ./app/google-services.json

      - name: Resolve Firebase App IDs from google-services.json
        run: |
          DEBUG_FIREBASE_APP_ID="$(jq -r '.client[] | select(.client_info.android_client_info.package_name=="com.jujodevs.pomodoro.debug") | .client_info.mobilesdk_app_id' app/google-services.json)"
          RELEASE_FIREBASE_APP_ID="$(jq -r '.client[] | select(.client_info.android_client_info.package_name=="com.jujodevs.pomodoro") | .client_info.mobilesdk_app_id' app/google-services.json)"

          if [ -z "${DEBUG_FIREBASE_APP_ID}" ] || [ "${DEBUG_FIREBASE_APP_ID}" = "null" ]; then
            echo "Missing Firebase app id for com.jujodevs.pomodoro.debug in google-services.json"
            exit 1
          fi

          if [ -z "${RELEASE_FIREBASE_APP_ID}" ] || [ "${RELEASE_FIREBASE_APP_ID}" = "null" ]; then
            echo "Missing Firebase app id for com.jujodevs.pomodoro in google-services.json"
            exit 1
          fi

          echo "DEBUG_FIREBASE_APP_ID=${DEBUG_FIREBASE_APP_ID}" >> "${GITHUB_ENV}"
          echo "RELEASE_FIREBASE_APP_ID=${RELEASE_FIREBASE_APP_ID}" >> "${GITHUB_ENV}"

      - name: Decode Firebase service account key
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON_BASE_64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_BASE_64 }}
        run: |
          printf "%s" "${FIREBASE_SERVICE_ACCOUNT_JSON_BASE_64}" | base64 --decode > "${RUNNER_TEMP}/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/firebase-service-account.json" >> "${GITHUB_ENV}"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Decode debug keystore
        if: ${{ inputs.build_variant == 'debug' }}
        env:
          DEBUG_KEYSTORE_STORE_FILE_BASE_64: ${{ secrets.DEBUG_KEYSTORE_STORE_FILE_BASE_64 }}
        run: |
          printf "%s" "${DEBUG_KEYSTORE_STORE_FILE_BASE_64}" | base64 --decode > "${RUNNER_TEMP}/debug.keystore"

      - name: Build signed debug APK
        if: ${{ inputs.build_variant == 'debug' }}
        env:
          DEBUG_KEYSTORE_STORE_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_STORE_PASSWORD }}
          DEBUG_KEYSTORE_KEY_ALIAS: ${{ secrets.DEBUG_KEYSTORE_KEY_ALIAS }}
          DEBUG_KEYSTORE_KEY_PASSWORD: ${{ secrets.DEBUG_KEYSTORE_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleDebug \
            -Pandroid.injected.signing.store.file="${RUNNER_TEMP}/debug.keystore" \
            -Pandroid.injected.signing.store.password="${DEBUG_KEYSTORE_STORE_PASSWORD}" \
            -Pandroid.injected.signing.key.alias="${DEBUG_KEYSTORE_KEY_ALIAS}" \
            -Pandroid.injected.signing.key.password="${DEBUG_KEYSTORE_KEY_PASSWORD}"

      - name: Distribute debug APK to Firebase
        if: ${{ inputs.build_variant == 'debug' }}
        env:
          DEBUG_GROUPS: ${{ secrets.FIREBASE_APP_DISTRIBUTION_DEBUG_GROUPS }}
        run: |
          DEBUG_APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ ! -f "${DEBUG_APK_PATH}" ]; then
            echo "Debug APK not found at ${DEBUG_APK_PATH}"
            exit 1
          fi

          RELEASE_NOTES="${{ inputs.release_notes }}"
          if [ -z "${RELEASE_NOTES}" ]; then
            RELEASE_NOTES="Debug build ${GITHUB_SHA}"
          fi

          EXTRA_ARGS=""
          if [ -n "${DEBUG_GROUPS}" ]; then
            EXTRA_ARGS="--groups ${DEBUG_GROUPS}"
          fi

          firebase appdistribution:distribute "${DEBUG_APK_PATH}" \
            --app "${DEBUG_FIREBASE_APP_ID}" \
            --release-notes "${RELEASE_NOTES}" \
            ${EXTRA_ARGS}

      - name: Decode release keystore
        if: ${{ inputs.build_variant == 'release' }}
        env:
          KEYSTORE_STORE_FILE_BASE_64: ${{ secrets.KEYSTORE_STORE_FILE_BASE_64 }}
        run: |
          printf "%s" "${KEYSTORE_STORE_FILE_BASE_64}" | base64 --decode > "${RUNNER_TEMP}/release.keystore"

      - name: Validate release keystore credentials
        if: ${{ inputs.build_variant == 'release' }}
        env:
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
        run: |
          keytool -list \
            -keystore "${RUNNER_TEMP}/release.keystore" \
            -storepass "${KEYSTORE_STORE_PASSWORD}" \
            -alias "${KEYSTORE_KEY_ALIAS}" > /dev/null

      - name: Build signed release APK
        if: ${{ inputs.build_variant == 'release' }}
        env:
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          ./gradlew :app:assembleRelease \
            -Pandroid.injected.signing.store.file="${RUNNER_TEMP}/release.keystore" \
            -Pandroid.injected.signing.store.password="${KEYSTORE_STORE_PASSWORD}" \
            -Pandroid.injected.signing.key.alias="${KEYSTORE_KEY_ALIAS}" \
            -Pandroid.injected.signing.key.password="${KEYSTORE_KEY_PASSWORD}"

      - name: Distribute release APK to Firebase
        if: ${{ inputs.build_variant == 'release' }}
        env:
          RELEASE_GROUPS: ${{ secrets.FIREBASE_APP_DISTRIBUTION_RELEASE_GROUPS }}
        run: |
          RELEASE_APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "${RELEASE_APK_PATH}" ]; then
            RELEASE_APK_PATH="$(find app/build/outputs/apk/release -name '*release*.apk' ! -name '*unsigned*' | head -n 1)"
          fi
          if [ -z "${RELEASE_APK_PATH}" ] || [ ! -f "${RELEASE_APK_PATH}" ]; then
            echo "Signed release APK not found"
            exit 1
          fi

          RELEASE_NOTES="${{ inputs.release_notes }}"
          if [ -z "${RELEASE_NOTES}" ]; then
            RELEASE_NOTES="Release build ${GITHUB_SHA}"
          fi

          EXTRA_ARGS=""
          if [ -n "${RELEASE_GROUPS}" ]; then
            EXTRA_ARGS="--groups ${RELEASE_GROUPS}"
          fi

          firebase appdistribution:distribute "${RELEASE_APK_PATH}" \
            --app "${RELEASE_FIREBASE_APP_ID}" \
            --release-notes "${RELEASE_NOTES}" \
            ${EXTRA_ARGS}
